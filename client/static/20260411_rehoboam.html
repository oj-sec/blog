<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Rehoboam</title>
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
            color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .selector-btn {
            background: #fff;
            border: 1px solid #000;
            padding: 5px 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            text-align: left;
        }

        .selector-btn:hover {
            background: #f0f0f0;
        }

        .selector-btn.active {
            background: #000;
            color: #fff;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            text-transform: uppercase;
            padding: 8px 0;
            cursor: pointer;
            border-top: 1px solid #eee;
            margin-top: 5px;
        }

        .toggle-container input {
            cursor: pointer;
            accent-color: #000;
        }

        #tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.98);
            padding: 15px;
            border: 1px solid #000;
            pointer-events: none;
            display: none;
            font-size: 11px;
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.05);
            width: 320px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .tt-question {
            display: block;
            margin-bottom: 12px;
            font-weight: bold;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .tt-meta-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 15px 10px;
            align-items: start;
        }

        .metric-group {
            display: flex;
            flex-direction: column;
        }

        .tt-label {
            color: #999;
            font-size: 8px;
            margin-bottom: 3px;
        }

        .brier-score {
            display: inline-block;
            font-weight: bold;
            padding: 4px 6px;
            color: #fff;
            border-radius: 2px;
            font-size: 10px;
        }

        .outcome-val,
        .forecast-val {
            font-weight: bold;
            font-size: 11px;
        }

        .brier-wrapper {
            text-align: right;
            grid-column: 2;
        }
    </style>
</head>

<body>
    <div id="controls">
        <button class="selector-btn active" data-key="brier_composite">Composite Index</button>
        <button class="selector-btn" data-key="brier_1w">1 Week Lead</button>
        <button class="selector-btn" data-key="brier_1m">1 Month Lead</button>
        <button class="selector-btn" data-key="brier_3m">3 Month Lead</button>
        <button class="selector-btn" data-key="brier_6m">6 Month Lead</button>

        <label class="toggle-container">
            <input type="checkbox" id="hide-inactive"> Hide Inactive Markets
        </label>
    </div>

    <div id="tooltip"></div>

    <script type="importmap">
        { 
            "imports": { 
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            } 
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const tooltip = document.getElementById('tooltip');
        const hideInactiveToggle = document.getElementById('hide-inactive');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 800;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.screenSpacePanning = true;
        controls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };

        const planeZ = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const intersectionPoint = new THREE.Vector3();

        let marketData = [];
        let pointsSystem = null;
        let currentBrierKey = 'brier_composite';
        let hideInactive = false;
        const radius = 220;

        const uniforms = { uTime: { value: 0.0 } };

        const candleMapping = {
            'brier_composite': { label: 'TOTAL VOLUME', key: 'volume', prefix: '$' },
            'brier_1w': { label: 'ACTIVE DAYS (90D @ 1W)', key: 'candles_90d_at_1w', prefix: '' },
            'brier_1m': { label: 'ACTIVE DAYS (90D @ 1M)', key: 'candles_90d_at_1m', prefix: '' },
            'brier_3m': { label: 'ACTIVE DAYS (90D @ 3M)', key: 'candles_90d_at_3m', prefix: '' },
            'brier_6m': { label: 'ACTIVE DAYS (90D @ 6M)', key: 'candles_90d_at_6m', prefix: '' }
        };

        const vertexShader = `
            uniform float uTime;
            attribute float alpha;
            attribute float brier;
            attribute float aOffset;
            attribute float aSpeed;
            varying float vAlpha;
            void main() {
                vAlpha = alpha;
                float phase = uTime * aSpeed + aOffset;
                float radialBob = sin(phase) * 0.7 + sin(phase * 0.4) * 0.3;
                float sideSway = cos(phase * 0.8) * 0.5;
                vec3 dir = normalize(position);
                vec3 tangent = vec3(-dir.y, dir.x, 0.0);
                float bobLimit = (radialBob < 0.0) ? radialBob * 0.25 : radialBob;
                float spikeIntensity = max(0.0, brier - 0.25);
                float rDisp = bobLimit * (1.5 + spikeIntensity * 50.0);
                float tDisp = sideSway * (1.0 + spikeIntensity * 12.0);
                vec3 newPos = position + (dir * rDisp) + (tangent * tDisp);
                vec4 vPos = modelViewMatrix * vec4(newPos, 1.0);
                gl_PointSize = 1.1 * (800.0 / -vPos.z);
                gl_Position = projectionMatrix * vPos;
            }
        `;

        const fragmentShader = `
            varying float vAlpha;
            void main() {
                float r = distance(gl_PointCoord, vec2(0.5));
                if (r > 0.5) discard;
                gl_FragColor = vec4(0.0, 0.0, 0.0, vAlpha * smoothstep(0.48, 0.4, r));
            }
        `;

        function getBrierColor(val) {
            return val <= 0.25 ? 'rgba(165, 214, 167, 0.9)' : 'rgba(239, 154, 154, 0.9)';
        }

        function formatMetric(val, prefix = '') {
            if (val >= 1000000) return prefix + (val / 1000000).toFixed(1) + 'M';
            if (val >= 1000) return prefix + (val / 1000).toFixed(1) + 'K';
            return prefix + val;
        }

        async function init() {
            try {
                const response = await fetch('./20260411_rehoboam_data.json');
                marketData = await response.json();
                createRehoboam();
                setupUI();
            } catch (e) {
                console.error("Initialization error:", e);
            }
        }

        function setupUI() {
            document.querySelectorAll('.selector-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.selector-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentBrierKey = btn.dataset.key;
                    createRehoboam();
                });
            });

            hideInactiveToggle.addEventListener('change', (e) => {
                hideInactive = e.target.checked;
                createRehoboam();
            });
        }

        function createRehoboam() {
            if (pointsSystem) {
                scene.remove(pointsSystem);
                pointsSystem.geometry.dispose();
            }

            const mapping = candleMapping[currentBrierKey];
            const filteredData = hideInactive
                ? marketData.filter(d => (Number(d[mapping.key]) || 0) > 0)
                : marketData;

            let totalParticles = 0;
            filteredData.forEach(d => {
                const bVal = Number(d[currentBrierKey]) || 0;
                // INVERTED DENSITY LOGIC:
                // Use a very low base multiplier (0.05) to make accurate markets sparse.
                // Use a high exponent and large scale (800) to make "wrong" markets very dense.
                const densityMultiplier = 0.05 + (Math.pow(bVal, 2.5) * 800);
                d.pointCount = Math.floor(450 * densityMultiplier);
                totalParticles += d.pointCount;
            });

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(totalParticles * 3);
            const alphas = new Float32Array(totalParticles);
            const briers = new Float32Array(totalParticles);
            const offsets = new Float32Array(totalParticles);
            const speeds = new Float32Array(totalParticles);

            let pIdx = 0;
            filteredData.forEach(d => {
                const bVal = Math.max(0, Number(d[currentBrierKey]) || 0);
                const baseAngle = Number(d.angle_rad) || 0;
                const spikeVal = Math.max(0, bVal - 0.25);
                const spikeLen = spikeVal * 200;
                const inwardBleed = spikeVal * 60;
                const startR = radius - inwardBleed;
                const span = (radius + spikeLen) - startR;

                for (let i = 0; i < d.pointCount; i++) {
                    const t = i / (d.pointCount - 1);
                    const currentR = (span === 0) ? radius : startR + span * t;
                    const distFromCircle = Math.abs(currentR - radius);
                    const taper = 1.0 - (distFromCircle / Math.max(spikeLen, inwardBleed, 1.0));
                    const mountainWidth = 8.0 + (Math.pow(spikeVal, 1.2) * 250.0) * Math.pow(taper, 1.5);
                    const rand = (Math.random() + Math.random() + Math.random() - 1.5) / 1.5;
                    const angle = baseAngle + (rand * mountainWidth / Math.max(currentR, 1.0));

                    positions[pIdx * 3] = Math.cos(angle) * currentR;
                    positions[pIdx * 3 + 1] = Math.sin(angle) * currentR;
                    positions[pIdx * 3 + 2] = 0;
                    alphas[pIdx] = Math.max(0.08, 0.7 * taper);
                    briers[pIdx] = bVal;
                    offsets[pIdx] = Math.random() * 100;
                    speeds[pIdx] = 0.4 + Math.random() * 1.4;
                    pIdx++;
                }
            });

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
            geometry.setAttribute('brier', new THREE.BufferAttribute(briers, 1));
            geometry.setAttribute('aOffset', new THREE.BufferAttribute(offsets, 1));
            geometry.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));

            pointsSystem = new THREE.Points(geometry, new THREE.ShaderMaterial({
                uniforms, vertexShader, fragmentShader, transparent: true, depthTest: false
            }));

            geometry.computeBoundingSphere();
            scene.add(pointsSystem);
        }

        function animate() {
            requestAnimationFrame(animate);
            uniforms.uTime.value = performance.now() * 0.0006;
            controls.update();

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(planeZ, intersectionPoint);

            if (intersectionPoint) {
                const dist = intersectionPoint.length();
                if (dist > radius - 60 && dist < radius + 350) {
                    let mAngle = Math.atan2(intersectionPoint.y, intersectionPoint.x);
                    if (mAngle < 0) mAngle += Math.PI * 2;

                    let closest = null, minD = Infinity;

                    marketData.forEach(d => {
                        let diff = Math.abs(d.angle_rad - mAngle);
                        if (diff > Math.PI) diff = Math.PI * 2 - diff;
                        if (diff < minD) { minD = diff; closest = d; }
                    });

                    const mapping = candleMapping[currentBrierKey];
                    const isActuallyHidden = hideInactive && (Number(closest[mapping.key]) || 0) <= 0;

                    if (closest && minD < 0.12 && !isActuallyHidden) {
                        const bVal = Number(closest[currentBrierKey]) || 0;
                        const outcomeStr = Number(closest.outcome) === 1 ? 'YES' : 'NO';

                        const rootBrier = Math.sqrt(bVal);
                        const probYes = (Number(closest.outcome) === 1) ? (1 - rootBrier) : rootBrier;
                        const label = probYes > 0.5 ? "YES" : "NO";
                        const finalProb = probYes > 0.5 ? probYes : (1 - probYes);
                        const forecastDisplay = `${label} ${(finalProb * 100).toFixed(0)}%`;

                        const rawMetric = closest[mapping.key] || 0;
                        const metricDisplay = formatMetric(rawMetric, mapping.prefix);

                        tooltip.style.display = 'block';
                        tooltip.innerHTML = `
                            <div class="tt-question">${closest.question}</div>
                            <div class="tt-meta-container">
                                <div class="metric-group">
                                    <div class="tt-label">OUTCOME</div>
                                    <div class="outcome-val">${outcomeStr}</div>
                                </div>
                                <div class="metric-group" style="text-align: right;">
                                    <div class="tt-label">FORECAST</div>
                                    <div class="forecast-val">${forecastDisplay}</div>
                                </div>
                                <div class="metric-group">
                                    <div class="tt-label">${mapping.label}</div>
                                    <div class="outcome-val">${metricDisplay}</div>
                                </div>
                                <div class="metric-group brier-wrapper">
                                    <div class="tt-label">BRIER SCORE</div>
                                    <span class="brier-score" style="background: ${getBrierColor(bVal)};">
                                        ${bVal.toFixed(6)}
                                    </span>
                                </div>
                            </div>
                        `;
                    } else { tooltip.style.display = 'none'; }
                } else { tooltip.style.display = 'none'; }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            tooltip.style.left = (e.clientX + 25) + 'px';
            tooltip.style.top = (e.clientY + 25) + 'px';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>

</html>
