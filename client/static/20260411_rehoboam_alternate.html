<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket - Directional Forecast</title>
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
            color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .selector-btn {
            background: #fff;
            border: 1px solid #000;
            padding: 5px 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            text-align: left;
        }

        .selector-btn:hover {
            background: #f0f0f0;
        }

        .selector-btn.active {
            background: #000;
            color: #fff;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            text-transform: uppercase;
            padding: 8px 0;
            cursor: pointer;
            border-top: 1px solid #eee;
            margin-top: 5px;
        }

        .toggle-container input {
            cursor: pointer;
            accent-color: #000;
        }

        #tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.98);
            padding: 15px;
            border: 1px solid #000;
            pointer-events: none;
            display: none;
            font-size: 11px;
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.05);
            width: 320px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .tt-question {
            display: block;
            margin-bottom: 12px;
            font-weight: bold;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .tt-meta-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 15px 10px;
            align-items: start;
        }

        .metric-group {
            display: flex;
            flex-direction: column;
        }

        .tt-label {
            color: #999;
            font-size: 8px;
            margin-bottom: 3px;
        }

        .brier-score {
            display: inline-block;
            font-weight: bold;
            padding: 4px 6px;
            color: #fff;
            border-radius: 2px;
            font-size: 10px;
        }

        .outcome-val,
        .forecast-val {
            font-weight: bold;
            font-size: 11px;
        }

        .brier-wrapper {
            text-align: right;
            grid-column: 2;
        }
    </style>
</head>

<body>
    <div id="controls">
        <button class="selector-btn active" data-key="brier_composite">Composite Index</button>
        <button class="selector-btn" data-key="brier_1w">1 Week Lead</button>
        <button class="selector-btn" data-key="brier_1m">1 Month Lead</button>
        <button class="selector-btn" data-key="brier_3m">3 Month Lead</button>
        <button class="selector-btn" data-key="brier_6m">6 Month Lead</button>

        <label class="toggle-container">
            <input type="checkbox" id="hide-inactive"> Hide Inactive Markets
        </label>
    </div>

    <div id="tooltip"></div>

    <script type="importmap">
        { 
            "imports": { 
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            } 
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const tooltip = document.getElementById('tooltip');
        const hideInactiveToggle = document.getElementById('hide-inactive');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        camera.position.z = 800;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.screenSpacePanning = true;
        controls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };

        const planeZ = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const intersectionPoint = new THREE.Vector3();

        let marketData = [];
        let meshSystem = null;
        let currentBrierKey = 'brier_composite';
        let hideInactive = false;
        const radius = 220;
        const lineThickness = 1.1;

        let mouseMoved = false;
        let isVisible = true;
        document.addEventListener('visibilitychange', () => {
            isVisible = !document.hidden;
        });

        const COLORS = {
            GOOD: new THREE.Color(0xa5d6a7),
            BAD: new THREE.Color(0xef9a9a)
        };

        const candleMapping = {
            'brier_composite': { label: 'TOTAL VOLUME', key: 'volume', prefix: '$' },
            'brier_1w': { label: 'ACTIVE DAYS (90D @ 1W)', key: 'candles_90d_at_1w', prefix: '' },
            'brier_1m': { label: 'ACTIVE DAYS (90D @ 1M)', key: 'candles_90d_at_1m', prefix: '' },
            'brier_3m': { label: 'ACTIVE DAYS (90D @ 3M)', key: 'candles_90d_at_3m', prefix: '' },
            'brier_6m': { label: 'ACTIVE DAYS (90D @ 6M)', key: 'candles_90d_at_6m', prefix: '' }
        };

        function getBrierColorCSS(val) {
            return val <= 0.25 ? 'rgba(165, 214, 167, 0.9)' : 'rgba(239, 154, 154, 0.9)';
        }

        function formatMetric(val, prefix = '') {
            if (val >= 1000000) return prefix + (val / 1000000).toFixed(1) + 'M';
            if (val >= 1000) return prefix + (val / 1000).toFixed(1) + 'K';
            return prefix + val;
        }

        async function init() {
            try {
                const response = await fetch('./20260411_rehoboam_data.json');
                marketData = await response.json();
                createRehoboam();
                setupUI();
            } catch (e) {
                console.error("Initialization error:", e);
            }
        }

        function setupUI() {
            document.querySelectorAll('.selector-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.selector-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentBrierKey = btn.dataset.key;
                    createRehoboam();
                });
            });

            hideInactiveToggle.addEventListener('change', (e) => {
                hideInactive = e.target.checked;
                createRehoboam();
            });
        }

        function createRehoboam() {
            if (meshSystem) {
                scene.remove(meshSystem);
                meshSystem.geometry.dispose();
                meshSystem.material.dispose();
            }

            const mapping = candleMapping[currentBrierKey];
            const filteredData = hideInactive
                ? marketData.filter(d => (Number(d[mapping.key]) || 0) > 0)
                : marketData;

            const geometry = new THREE.PlaneGeometry(1, 1);
            const material = new THREE.MeshBasicMaterial({
                transparent: true,
                opacity: 0.85,
                side: THREE.DoubleSide
            });

            meshSystem = new THREE.InstancedMesh(geometry, material, filteredData.length);
            const dummy = new THREE.Object3D();

            filteredData.forEach((d, i) => {
                const bVal = Number(d[currentBrierKey]) || 0;
                const angle = Number(d.angle_rad) || 0;

                let lineLength = 0;
                let color = COLORS.GOOD;

                if (bVal <= 0.25) {
                    lineLength = ((0.25 - bVal) / 0.25) * 110;
                    const midR = radius - (lineLength / 2);
                    dummy.position.set(Math.cos(angle) * midR, Math.sin(angle) * midR, 0);
                    color = COLORS.GOOD;
                } else {
                    lineLength = ((bVal - 0.25) / 0.75) * 180;
                    const midR = radius + (lineLength / 2);
                    dummy.position.set(Math.cos(angle) * midR, Math.sin(angle) * midR, 0);
                    color = COLORS.BAD;
                }

                dummy.rotation.z = angle + Math.PI / 2;
                dummy.scale.set(lineThickness, lineLength, 1);
                dummy.updateMatrix();

                meshSystem.setMatrixAt(i, dummy.matrix);
                meshSystem.setColorAt(i, color);
            });

            meshSystem.instanceMatrix.needsUpdate = true;
            if (meshSystem.instanceColor) meshSystem.instanceColor.needsUpdate = true;

            scene.add(meshSystem);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isVisible) return;

            controls.update();

            if (mouseMoved) {
                mouseMoved = false;

                raycaster.setFromCamera(mouse, camera);
                raycaster.ray.intersectPlane(planeZ, intersectionPoint);

                if (intersectionPoint) {
                    const dist = intersectionPoint.length();
                    if (dist > radius - 150 && dist < radius + 350) {
                        let mAngle = Math.atan2(intersectionPoint.y, intersectionPoint.x);
                        if (mAngle < 0) mAngle += Math.PI * 2;

                        let closest = null, minD = Infinity;

                        marketData.forEach(d => {
                            let diff = Math.abs(d.angle_rad - mAngle);
                            if (diff > Math.PI) diff = Math.PI * 2 - diff;
                            if (diff < minD) { minD = diff; closest = d; }
                        });

                        const mapping = candleMapping[currentBrierKey];
                        const isActuallyHidden = hideInactive && (Number(closest[mapping.key]) || 0) <= 0;

                        if (closest && minD < 0.03 && !isActuallyHidden) {
                            const bVal = Number(closest[currentBrierKey]) || 0;
                            const outcome = Number(closest.outcome);
                            const outcomeStr = outcome === 1 ? 'YES' : 'NO';

                            const rootBrier = Math.sqrt(bVal);
                            const probYes = (outcome === 1) ? (1 - rootBrier) : rootBrier;
                            const label = probYes > 0.5 ? "YES" : "NO";
                            const finalProb = probYes > 0.5 ? probYes : (1 - probYes);
                            const forecastDisplay = `${label} ${(finalProb * 100).toFixed(0)}%`;

                            const rawMetric = closest[mapping.key] || 0;
                            const metricDisplay = formatMetric(rawMetric, mapping.prefix);

                            tooltip.style.display = 'block';
                            tooltip.innerHTML = `
                                <div class="tt-question">${closest.question}</div>
                                <div class="tt-meta-container">
                                    <div class="metric-group">
                                        <div class="tt-label">OUTCOME</div>
                                        <div class="outcome-val">${outcomeStr}</div>
                                    </div>
                                    <div class="metric-group" style="text-align: right;">
                                        <div class="tt-label">FORECAST</div>
                                        <div class="forecast-val">${forecastDisplay}</div>
                                    </div>
                                    <div class="metric-group">
                                        <div class="tt-label">${mapping.label}</div>
                                        <div class="outcome-val">${metricDisplay}</div>
                                    </div>
                                    <div class="metric-group brier-wrapper">
                                        <div class="tt-label">BRIER SCORE</div>
                                        <span class="brier-score" style="background: ${getBrierColorCSS(bVal)};">
                                            ${bVal.toFixed(6)}
                                        </span>
                                    </div>
                                </div>
                            `;
                        } else {
                            tooltip.style.display = 'none';
                        }
                    } else {
                        tooltip.style.display = 'none';
                    }
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            tooltip.style.left = (e.clientX + 25) + 'px';
            tooltip.style.top = (e.clientY + 25) + 'px';
            mouseMoved = true;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>

</html>
